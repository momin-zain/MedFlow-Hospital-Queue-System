<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQueue · Book Appointment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray-dark: #334155;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --light: #f8fafc;
            --border: #e2e8f0;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: var(--primary);
            animation: float 20s ease-in-out infinite;
        }

        .shape-2 {
            bottom: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: var(--secondary);
            animation: float 25s ease-in-out infinite reverse;
        }

        .shape-3 {
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: var(--warning);
            transform: translate(-50%, -50%);
            animation: pulse-slow 15s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: var(--gradient-1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }

        .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text h1 span {
            font-weight: 400;
            opacity: 0.8;
        }

        .logo-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        /* Booking Card */
        .booking-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .booking-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .booking-header i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .booking-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .booking-header p {
            color: var(--gray);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--primary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        .time-slot {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .time-slot:hover {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .time-slot.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-book {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-book:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            color: var(--primary);
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .success-message.show {
            display: flex;
        }

        /* Action Card for Back */
        .back-action {
            margin-top: 24px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .booking-card {
                padding: 24px;
            }
            .time-slots {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Decorative Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <div class="logo-text">
                    <h1>Med<span>Queue</span></h1>
                    <p>Book Your Appointment</p>
                </div>
            </div>
        </div>

        <!-- Booking Card -->
        <div class="booking-card">
            <div class="booking-header">
                <i class="fas fa-calendar-check"></i>
                <h2>Book an Appointment</h2>
                <p>Schedule your visit with our specialist doctors</p>
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle" style="font-size: 24px;"></i>
                <div>
                    <strong>Appointment Booked!</strong><br>
                    Your token will be generated on the day of visit.
                </div>
            </div>

            <form id="appointmentForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="patientName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-stethoscope"></i> Select Doctor</label>
                    <select id="doctorSelect" required>
                        <option value="">-- Select Doctor --</option>
                        <option value="Dr. Sharma">Dr. Sharma (Cardiology)</option>
                        <option value="Dr. Khan">Dr. Khan (Neurology)</option>
                        <option value="Dr. Patel">Dr. Patel (General Medicine)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-day"></i> Select Date</label>
                    <input type="date" id="appointmentDate" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Preferred Time Slot</label>
                    <div class="time-slots" id="timeSlots">
                        <div class="time-slot" data-time="09:00 AM">09:00 AM</div>
                        <div class="time-slot" data-time="10:00 AM">10:00 AM</div>
                        <div class="time-slot" data-time="11:00 AM">11:00 AM</div>
                        <div class="time-slot" data-time="12:00 PM">12:00 PM</div>
                        <div class="time-slot" data-time="02:00 PM">02:00 PM</div>
                        <div class="time-slot" data-time="03:00 PM">03:00 PM</div>
                        <div class="time-slot" data-time="04:00 PM">04:00 PM</div>
                        <div class="time-slot" data-time="05:00 PM">05:00 PM</div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Additional Notes (Optional)</label>
                    <textarea rows="3" id="notes" placeholder="Any symptoms or special requirements..."></textarea>
                </div>

                <button type="submit" class="btn-book">
                    <i class="fas fa-calendar-check"></i> Confirm Appointment
                </button>
            </form>

            <div class="back-action">
                <a href="public.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Public Display
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase.js';
        import { 
            collection, 
            addDoc, 
            query, 
            where, 
            getDocs,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('appointmentDate').min = today;
        document.getElementById('appointmentDate').value = today;

        // Time slot selection
        let selectedTime = null;
        const timeSlots = document.querySelectorAll('.time-slot');
        
        timeSlots.forEach(slot => {
            slot.addEventListener('click', () => {
                timeSlots.forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
                selectedTime = slot.dataset.time;
            });
        });

        // Check if slot is already booked
        async function checkSlotAvailability(doctor, date, time) {
            try {
                const q = query(
                    collection(db, 'appointments'),
                    where('doctorId', '==', doctor),
                    where('appointmentDate', '==', date),
                    where('timeSlot', '==', time)
                );
                const snapshot = await getDocs(q);
                return snapshot.empty;
            } catch (error) {
                console.log("Collection may not exist yet, assuming available");
                return true;
            }
        }

        // Generate appointment ID
        function generateAppointmentId() {
            const prefix = 'APT';
            const timestamp = Date.now().toString().slice(-8);
            const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            return `${prefix}${timestamp}${random}`;
        }

        // Handle form submission
        const form = document.getElementById('appointmentForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const patientName = document.getElementById('patientName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const doctorId = document.getElementById('doctorSelect').value;
            const appointmentDate = document.getElementById('appointmentDate').value;
            const notes = document.getElementById('notes').value.trim();
            
            if (!patientName || !phoneNumber || !doctorId || !appointmentDate) {
                alert('Please fill all required fields');
                return;
            }
            
            if (!selectedTime) {
                alert('Please select a time slot');
                return;
            }
            
            // Check availability
            const isAvailable = await checkSlotAvailability(doctorId, appointmentDate, selectedTime);
            
            if (!isAvailable) {
                alert('This time slot is already booked. Please select another time.');
                return;
            }
            
            // Create appointment
            const appointmentId = generateAppointmentId();
            
            try {
                await addDoc(collection(db, 'appointments'), {
                    appointmentId: appointmentId,
                    patientName: patientName,
                    phoneNumber: phoneNumber,
                    doctorId: doctorId,
                    appointmentDate: appointmentDate,
                    timeSlot: selectedTime,
                    notes: notes,
                    status: 'confirmed',
                    createdAt: Timestamp.now(),
                    tokenGenerated: false
                });
                
                // Show success message
                successMessage.classList.add('show');
                
                // Reset form
                document.getElementById('patientName').value = '';
                document.getElementById('phoneNumber').value = '';
                document.getElementById('doctorSelect').value = '';
                document.getElementById('notes').value = '';
                timeSlots.forEach(s => s.classList.remove('selected'));
                selectedTime = null;
                document.getElementById('appointmentDate').value = today;
                
                // Scroll to success message
                successMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 5000);
                
            } catch (error) {
                console.error('Error booking appointment:', error);
                alert('Error booking appointment. Please try again.');
            }
        });
    </script>
</body>
</html>
